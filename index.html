<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/app-icon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <title>Copro Watch</title>
    <script>
      // ERROR HANDLER: Catch early crashes & display them on-screen for debugging
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = '#fff';
        div.style.color = '#000';
        div.style.padding = '20px';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.style.fontFamily = 'monospace';
        div.innerHTML = '<h1>FATAL CRASH</h1><p><b>Message:</b> ' + msg + '</p>' +
                        '<p><b>File:</b> ' + url + '</p>' +
                        '<p><b>Line:</b> ' + line + ':' + col + '</p>' +
                        '<p><b>Trace:</b> <pre>' + (error ? error.stack : 'No stack trace') + '</pre></p>';
        document.body.appendChild(div);
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
